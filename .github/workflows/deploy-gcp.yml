# Simplest path: one JSON service account key in secret GCP_SA_KEY (no Workload Identity).

name: Deploy to GCP

on:
  push:
    branches: [main]

env:
  GCP_REGION: us-central1
  AR_REPO: ftth-system
  BACKEND_SERVICE: ftth-backend
  FRONTEND_SERVICE: ftth-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Docker login (Artifact Registry)
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/backend:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"
          echo "BACKEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      # GitHub runner IPs are not in Cloud SQL authorized networks. Use Cloud SQL Auth
      # Proxy + DATABASE_URL pointed at 127.0.0.1 so Prisma can reach the instance.
      # Requires secrets.CLOUDSQL_CONNECTION_NAME and deploy SA with roles/cloudsql.client.
      - name: Prisma migrate deploy
        run: |
          set -euo pipefail
          SRC_URL="${{ secrets.DATABASE_URL }}"
          if [ -n "${{ secrets.CLOUDSQL_CONNECTION_NAME }}" ]; then
            curl -fsSL -o cloud-sql-proxy \
              https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.2/cloud-sql-proxy.linux.amd64
            chmod +x cloud-sql-proxy
            ./cloud-sql-proxy "${{ secrets.CLOUDSQL_CONNECTION_NAME }}" --address 127.0.0.1 --port 5432 &
            PROXY_PID=$!
            trap 'kill "$PROXY_PID" 2>/dev/null || true' EXIT
            for i in $(seq 1 45); do
              nc -z 127.0.0.1 5432 && break
              if [ "$i" -eq 45 ]; then
                echo "Cloud SQL proxy did not become ready on 127.0.0.1:5432"
                exit 1
              fi
              sleep 1
            done
            MIGRATE_URL=$(echo "$SRC_URL" | sed -E 's#(postgresql://[^@]+@)[^/]+#\1127.0.0.1:5432#')
            MIGRATE_URL=$(echo "$MIGRATE_URL" | sed -E 's/([?&])sslmode=[^&]*//g' | sed 's/\?&/?/' | sed 's/&$//' | sed 's/\?$//')
            if echo "$MIGRATE_URL" | grep -q '\?'; then
              MIGRATE_URL="${MIGRATE_URL}&sslmode=disable"
            else
              MIGRATE_URL="${MIGRATE_URL}?sslmode=disable"
            fi
            docker run --rm --network host \
              -e DATABASE_URL="$MIGRATE_URL" \
              "${{ env.BACKEND_IMAGE }}" \
              npx prisma migrate deploy
          else
            docker run --rm \
              -e DATABASE_URL="$SRC_URL" \
              "${{ env.BACKEND_IMAGE }}" \
              npx prisma migrate deploy
          fi

      - name: Build Cloud Run DATABASE_URL
        id: runtime_db
        run: |
          SRC="${{ secrets.DATABASE_URL }}"
          CONN="${{ secrets.CLOUDSQL_CONNECTION_NAME }}"
          if [ -n "$CONN" ]; then
            CREDS=$(echo "$SRC" | sed -E 's#postgresql://([^@]+)@.*#\1#')
            DBNAME=$(echo "$SRC" | sed -E 's#.*:[0-9]+/([^?]+).*#\1#')
            RUNTIME_URL="postgresql://${CREDS}@localhost/${DBNAME}?host=/cloudsql/${CONN}"
            echo "url=$RUNTIME_URL" >> "$GITHUB_OUTPUT"
          else
            echo "url=$SRC" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy backend to Cloud Run
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          IMAGE="${{ env.BACKEND_IMAGE }}"
          if [ -n "${{ secrets.CLOUDSQL_CONNECTION_NAME }}" ]; then
            gcloud run deploy "${{ env.BACKEND_SERVICE }}" \
              --image "$IMAGE" \
              --region "${{ env.GCP_REGION }}" \
              --project "$PROJECT_ID" \
              --platform managed \
              --allow-unauthenticated \
              --port 8080 \
              --add-cloudsql-instances="${{ secrets.CLOUDSQL_CONNECTION_NAME }}" \
              --set-env-vars "DATABASE_URL=${{ steps.runtime_db.outputs.url }},GCP_PROJECT_ID=$PROJECT_ID,GCS_BUCKET_IMPORTS=${{ secrets.GCS_BUCKET_IMPORTS }},GCS_BUCKET_PHOTOS=${{ secrets.GCS_BUCKET_PHOTOS }}"
          else
            gcloud run deploy "${{ env.BACKEND_SERVICE }}" \
              --image "$IMAGE" \
              --region "${{ env.GCP_REGION }}" \
              --project "$PROJECT_ID" \
              --platform managed \
              --allow-unauthenticated \
              --port 8080 \
              --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},GCP_PROJECT_ID=$PROJECT_ID,GCS_BUCKET_IMPORTS=${{ secrets.GCS_BUCKET_IMPORTS }},GCS_BUCKET_PHOTOS=${{ secrets.GCS_BUCKET_PHOTOS }}"
          fi

      - name: Backend URL
        id: backend
        run: |
          URL=$(gcloud run services describe "${{ env.BACKEND_SERVICE }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/frontend:${{ github.sha }}"
          docker build \
            --build-arg VITE_API_URL="${{ steps.backend.outputs.url }}" \
            -t "$IMAGE" \
            ./frontend
          docker push "$IMAGE"
          echo "FRONTEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy "${{ env.FRONTEND_SERVICE }}" \
            --image "${{ env.FRONTEND_IMAGE }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 80
