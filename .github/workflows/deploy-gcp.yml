# Simplest path: one JSON service account key in secret GCP_SA_KEY (no Workload Identity).

name: Deploy to GCP

on:
  push:
    branches: [main, dev]

env:
  GCP_REGION: us-central1
  AR_REPO: ftth-system
  BACKEND_SERVICE: ftth-backend
  FRONTEND_SERVICE: ftth-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Docker login (Artifact Registry)
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/backend:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"
          echo "BACKEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Prisma migrate deploy
        run: |
          docker run --rm \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            "${{ env.BACKEND_IMAGE }}" \
            npx prisma migrate deploy

      - name: Deploy backend to Cloud Run
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          IMAGE="${{ env.BACKEND_IMAGE }}"
          if [ -n "${{ secrets.CLOUDSQL_CONNECTION_NAME }}" ]; then
            gcloud run deploy "${{ env.BACKEND_SERVICE }}" \
              --image "$IMAGE" \
              --region "${{ env.GCP_REGION }}" \
              --project "$PROJECT_ID" \
              --platform managed \
              --allow-unauthenticated \
              --port 8080 \
              --add-cloudsql-instances="${{ secrets.CLOUDSQL_CONNECTION_NAME }}" \
              --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},GCP_PROJECT_ID=$PROJECT_ID,GCS_BUCKET_IMPORTS=${{ secrets.GCS_BUCKET_IMPORTS }},GCS_BUCKET_PHOTOS=${{ secrets.GCS_BUCKET_PHOTOS }}"
          else
            gcloud run deploy "${{ env.BACKEND_SERVICE }}" \
              --image "$IMAGE" \
              --region "${{ env.GCP_REGION }}" \
              --project "$PROJECT_ID" \
              --platform managed \
              --allow-unauthenticated \
              --port 8080 \
              --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},GCP_PROJECT_ID=$PROJECT_ID,GCS_BUCKET_IMPORTS=${{ secrets.GCS_BUCKET_IMPORTS }},GCS_BUCKET_PHOTOS=${{ secrets.GCS_BUCKET_PHOTOS }}"
          fi

      - name: Backend URL
        id: backend
        run: |
          URL=$(gcloud run services describe "${{ env.BACKEND_SERVICE }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/frontend:${{ github.sha }}"
          docker build \
            --build-arg VITE_API_URL="${{ steps.backend.outputs.url }}" \
            -t "$IMAGE" \
            ./frontend
          docker push "$IMAGE"
          echo "FRONTEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy "${{ env.FRONTEND_SERVICE }}" \
            --image "${{ env.FRONTEND_IMAGE }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 80
